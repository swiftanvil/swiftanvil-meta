name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate registry YAML
        run: python3 -c "import yaml; yaml.safe_load(open('REGISTRY.yml'))"

      - name: Validate document registry references
        uses: swiftanvil/swiftanvil-enforcement/.github/workflows/document-registry-policy.yml@v1
        with:
          registry_repository: swiftanvil/swiftanvil-meta
          registry_ref: main
