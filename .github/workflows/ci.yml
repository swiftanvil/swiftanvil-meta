name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate registry YAML
        run: python3 -c "import yaml; yaml.safe_load(open('REGISTRY.yml'))"

      - name: Validate all YAML files in .github/workflows
        run: |
          for f in .github/workflows/*.yml; do
            echo "Validating $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))"
          done

      - name: Check document registry locally
        run: |
          bash <(curl -sL https://raw.githubusercontent.com/swiftanvil/swiftanvil-enforcement/v1/scripts/validate-document-registry.sh) \
            --registry-root . --root .
