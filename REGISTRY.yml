# ---
# Repository Registry
# ---
# Machine-readable catalog of all SwiftAnvil GitHub repositories.
# Agents use this for discovery, routing, and cross-repo workflows.

repositories:
  # Meta & Tooling
  swiftanvil-meta:
    name: "SwiftAnvil Meta"
    category: meta
    description: "Organization memory, registry, policy, and orchestration"
    github_topics: [swiftanvil, meta, registry, policy]
    agent_prompt: null
    setup_order: null
    dependencies: []

  swiftanvil-cli:
    name: "SwiftAnvil CLI"
    category: tool
    description: "Developer command-line interface for SwiftAnvil"
    github_topics: [swiftanvil, tool, cli, developer-experience]
    agent_prompt: null
    setup_order: null
    dependencies: []

  swiftanvil-enforcement:
    name: "SwiftAnvil Enforcement"
    category: tool
    description: "Lint rules, policy checks, and compliance enforcement"
    github_topics: [swiftanvil, tool, lint, enforcement]
    agent_prompt: null
    setup_order: null
    dependencies: []

  # Infrastructure (Managed Worker Product Group)
  swiftanvil-anvil-host:
    name: "AnvilHost"
    category: infrastructure
    product_group: managed-worker
    description: "Provision Mac as hands-off CI worker (LaunchAgent, power, cleanup)"
    github_topics: [swiftanvil, infra, ci-worker, macos, launchagent]
    agent_prompt: "Set up this Mac as a CI worker"
    setup_order: 1
    dependencies: []

  swiftanvil-anvil-runner:
    name: "AnvilRunner"
    category: infrastructure
    product_group: managed-worker
    description: "Self-hosted GitHub Actions runner lifecycle management"
    github_topics: [swiftanvil, infra, ci-worker, github-actions, macos]
    agent_prompt: "Set up GitHub Actions runners for my repositories on this Mac"
    setup_order: 2
    dependencies: [swiftanvil-anvil-host]

  # Shared Libraries
  swiftanvil-anvil-core:
    name: "AnvilCore"
    category: library
    description: "Foundation types and utilities"
    github_topics: [swiftanvil, library, foundation]
    agent_prompt: null
    setup_order: null
    dependencies: []

  swiftanvil-anvil-network:
    name: "AnvilNetwork"
    category: library
    description: "Networking abstractions and utilities"
    github_topics: [swiftanvil, library, network]
    agent_prompt: null
    setup_order: null
    dependencies: []

  swiftanvil-anvil-flags:
    name: "AnvilFlags"
    category: library
    description: "Feature flag management"
    github_topics: [swiftanvil, library, feature-flags]
    agent_prompt: null
    setup_order: null
    dependencies: []

  swiftanvil-anvil-settings:
    name: "AnvilSettings"
