# SwiftAnvil Document Registry
#
# This is the canonical routing table for documents in this repository.
# Other documents should refer to these stable IDs instead of hardcoding paths.

version: 1

rules:
  - Only this registry owns document paths.
  - Stable document IDs must not be renamed casually.
  - If a file moves, update its path here and keep the ID stable.
  - If a document is renamed, add the old name under aliases during migration.
  - Agent instructions, code blocks, and checklists should refer to document IDs.

documents:
  meta.registry:
    title: Document Registry
    path: REGISTRY.yml
    audience: [human, agent]
    aliases: []

  meta.readme:
    title: SwiftAnvil Meta README
    path: README.md
    audience: [human, agent]
    aliases: []

  meta.resume:
    title: Human Session Resume Guide
    path: RESUME.md
    audience: [human]
    aliases: []
    load_policy:
      conditional: "human-in-the-loop sessions only"
      order: 20
      estimated_lines: 30

  meta.agents:
    title: Agent Instructions
    path: AGENTS.md
    audience: [agent]
    aliases: []

  agents.compatibility:
    title: Agent Compatibility Policy
    path: AGENT_COMPATIBILITY.md
    audience: [human, agent]
    aliases: []
    load_policy:
      conditional: "using a new or unusual agent"
      order: 14
      estimated_lines: 40

  agents.diagnostics:
    title: Agent Diagnostics
    path: AGENT_DIAGNOSTICS.md
    audience: [human, agent]
    aliases: []
    load_policy:
      conditional: "agent or reviewer commands fail"
      order: 15
      estimated_lines: 30

  meta.session-start:
    title: Session Start Checklist
    path: MEMORY/99-SESSION_START.md
    audience: [agent]
    aliases: [MEMORY/99-SESSION_START.md]
    load_policy:
      always: true
      order: 1
      estimated_lines: 60

  meta.memory-system:
    title: Memory System
    path: MEMORY_SYSTEM.md
    audience: [human, agent]
    aliases: []

  memory.meta:
    title: Memory System Usage
    path: MEMORY/00-META.md
    audience: [human, agent]
    aliases: [00-META.md]
    load_policy:
      always: true
      order: 2
      estimated_lines: 50

  memory.identity:
    title: SwiftAnvil Identity
    path: MEMORY/01-IDENTITY.md
    audience: [human, agent]
    aliases: [01-IDENTITY.md]
    load_policy:
      always: true
      order: 3
      estimated_lines: 30

  policy.platform:
    title: Platform Policy
    path: PLATFORM_POLICY.md
    mirror: MEMORY/02-PLATFORM_POLICY.md
    audience: [human, agent]
    aliases: [02-PLATFORM_POLICY.md]
    load_policy:
      always: true
      order: 4
      estimated_lines: 80

  workflow.orchestration:
    title: Orchestration Framework
    path: ORCHESTRATION_FRAMEWORK.md
    mirror: MEMORY/03-ORCHESTRATION.md
    audience: [human, agent]
    aliases: [03-ORCHESTRATION.md]
    load_policy:
      always: true
      order: 5
      estimated_lines: 120

  improvement.framework:
    title: Improvement Framework
    path: IMPROVEMENT_FRAMEWORK.md
    mirror: MEMORY/04-IMPROVEMENT.md
    audience: [human, agent]
    aliases: [04-IMPROVEMENT.md]
    load_policy:
      conditional: "any package PMS < 80 or improvement work planned"
      order: 10
      estimated_lines: 100

  quality.standards:
    title: Quality Standards
    path: MEMORY/05-QUALITY.md
    audience: [human, agent]
    aliases: [05-QUALITY.md]
    load_policy:
      conditional: "reviewing code or writing tests"
      order: 11
      estimated_lines: 40

  modernization.api:
    title: API Modernization
    path: API_MODERNIZATION.md
    mirror: MEMORY/06-API_MODERNIZATION.md
    audience: [human, agent]
    aliases: [06-API_MODERNIZATION.md]
    load_policy:
